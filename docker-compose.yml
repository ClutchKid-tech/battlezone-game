version: '3.9'

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       battlezone
      POSTGRES_USER:     battlezone
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U battlezone"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Game Server ────────────────────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      NODE_ENV:         production
      PORT:             8080
      DATABASE_URL:     postgresql://battlezone:password@postgres:5432/battlezone
      REDIS_URL:        redis://redis:6379
      JWT_SECRET:       ${JWT_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      CLIENT_ORIGIN:    ${CLIENT_ORIGIN:-http://localhost:3000}
      TICK_RATE:        64
      MIN_START_PLAYERS: 1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2g

  # ── Web Client (Nginx) ─────────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.client
    restart: unless-stopped
    ports:
      - "3000:80"
      - "8000:80"
    depends_on:
      - server

volumes:
  postgres_data:
  redis_data:
