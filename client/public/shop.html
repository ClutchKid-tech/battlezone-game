<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BATTLEZONE — ITEM SHOP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#FF6B1A;--gold:#F0C040;--dark:#060809;
  --panel:rgba(8,14,20,0.92);--bright:#F0EDE8;--muted:#7A7268;
  --danger:#E8230A;--success:#2ECC71;
  --leg-bg:linear-gradient(145deg,#1E1200,#120A00);--leg-glow:#F0C040;
  --epic-bg:linear-gradient(145deg,#180B28,#0E0618);--epic-glow:#8B5CF6;
  --rare-bg:linear-gradient(145deg,#081828,#040E18);--rare-glow:#3B82F6;
  --unc-bg:linear-gradient(145deg,#081408,#040E04);--unc-glow:#22C55E;
  --com-bg:linear-gradient(145deg,#101014,#08080C);--com-glow:#6B7280;
}
html,body{height:100%;overflow:hidden;background:#060809;color:#F0EDE8;font-family:'Exo 2',sans-serif}
canvas#bg{position:fixed;inset:0;z-index:0}
.scanlines{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px)}
.vignette{position:fixed;inset:0;z-index:2;pointer-events:none;
  background:radial-gradient(ellipse at 50% 40%,transparent 30%,rgba(0,0,0,0.7) 100%)}
.hud-corner{position:fixed;width:60px;height:60px;z-index:10;pointer-events:none;
  opacity:0;animation:corner-in .5s ease forwards}
.hud-tl{top:12px;left:12px;border-top:2px solid var(--orange);border-left:2px solid var(--orange);animation-delay:.1s}
.hud-tr{top:12px;right:12px;border-top:2px solid var(--orange);border-right:2px solid var(--orange);animation-delay:.2s}
.hud-bl{bottom:12px;left:12px;border-bottom:2px solid var(--orange);border-left:2px solid var(--orange);animation-delay:.3s}
.hud-br{bottom:12px;right:12px;border-bottom:2px solid var(--orange);border-right:2px solid var(--orange);animation-delay:.4s}
@keyframes corner-in{from{opacity:0;width:16px;height:16px}to{opacity:1;width:60px;height:60px}}

/* ── LAYOUT ── */
#app{position:fixed;inset:0;z-index:5;display:flex;flex-direction:column;overflow:hidden}

/* TOP BAR */
#topbar{
  height:56px;flex-shrink:0;display:flex;align-items:center;gap:16px;
  padding:0 24px;
  background:linear-gradient(90deg,rgba(6,8,12,.98),rgba(6,8,12,.88),rgba(6,8,12,.98));
  border-bottom:1px solid rgba(255,107,26,.25);
}
#back-btn{
  display:flex;align-items:center;gap:8px;height:36px;padding:0 16px;
  background:rgba(255,107,26,.07);border:1px solid rgba(255,107,26,.3);
  color:#A09890;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:.25em;
  cursor:pointer;clip-path:polygon(8px 0,100% 0,100% 100%,0 100%,0 8px);
  transition:all .14s;text-decoration:none;
}
#back-btn:hover{background:rgba(255,107,26,.15);border-color:var(--orange);color:var(--bright)}
#shop-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.12em;
  color:var(--bright);text-shadow:0 0 20px rgba(255,107,26,.3)}
.title-sep{width:1px;height:24px;background:rgba(255,107,26,.2)}
#balance{display:flex;align-items:center;gap:8px;margin-left:auto;
  font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--muted);letter-spacing:.1em}
#balance-icon{color:var(--gold);font-size:16px}
#balance-val{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold);
  text-shadow:0 0 12px rgba(240,192,64,.4);letter-spacing:.05em}
#get-coins-fixed{
  position:fixed;bottom:60px;right:20px;z-index:50;
  display:flex;align-items:center;gap:8px;height:44px;padding:0 18px;
  background:linear-gradient(135deg,rgba(240,192,64,.18),rgba(180,120,0,.1));
  border:1px solid rgba(240,192,64,.5);color:var(--gold);
  font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:.2em;
  cursor:pointer;clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px));
  transition:all .15s;box-shadow:0 0 16px rgba(240,192,64,.12);
}
#get-coins-fixed:hover{background:linear-gradient(135deg,rgba(240,192,64,.3),rgba(180,120,0,.18));
  box-shadow:0 0 30px rgba(240,192,64,.3);border-color:var(--gold)}

/* TABS */
#tabbar{
  height:46px;flex-shrink:0;display:flex;align-items:stretch;
  padding:0 24px;gap:4px;
  background:rgba(6,8,12,.7);border-bottom:1px solid rgba(255,107,26,.12);
}
.tab-btn{
  display:flex;align-items:center;gap:7px;padding:0 18px;
  background:transparent;border:none;border-bottom:2px solid transparent;
  color:var(--muted);font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:.2em;
  cursor:pointer;transition:all .14s;position:relative;
}
.tab-btn:hover{color:var(--bright)}
.tab-btn.active{color:var(--orange);border-bottom-color:var(--orange)}
.tab-badge{
  background:var(--danger);color:#fff;font-family:'Share Tech Mono',monospace;
  font-size:9px;padding:1px 5px;border-radius:2px;line-height:1.4;
}

/* GRID */
#grid-wrap{flex:1;overflow-y:auto;padding:20px 20px 8px;
  scrollbar-width:thin;scrollbar-color:rgba(255,107,26,.3) transparent}
#grid-wrap::-webkit-scrollbar{width:4px}
#grid-wrap::-webkit-scrollbar-thumb{background:rgba(255,107,26,.3);border-radius:2px}
#item-grid{display:grid;gap:14px;
  grid-template-columns:repeat(auto-fill,minmax(188px,1fr))}
#item-grid.has-featured{grid-template-columns:repeat(auto-fill,minmax(188px,1fr))}

/* BOTTOM BAR */
#bottombar{
  height:36px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;
  background:rgba(6,8,12,.95);border-top:1px solid rgba(255,107,26,.12);
  font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.14em;
}
#shop-timer{color:var(--orange);opacity:.8}
#reset-timer span{color:var(--bright)}

/* ── ITEM CARD ── */
.item-card{
  position:relative;display:flex;flex-direction:column;
  border:1px solid rgba(255,255,255,.08);
  overflow:hidden;cursor:pointer;
  transition:transform .18s,box-shadow .18s;
  animation:card-in .35s ease both;
}
.item-card:hover{transform:translateY(-5px)}
.item-card.featured{grid-column:span 2}
@keyframes card-in{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.card-art{
  flex:1;min-height:160px;display:flex;align-items:center;justify-content:center;
  position:relative;padding:16px;
}
.card-art svg{width:100%;max-height:130px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.5))}
.item-card.featured .card-art{min-height:200px}
.item-card.featured .card-art svg{max-height:170px}

.rarity-bar{height:3px;width:100%}
.card-meta{
  padding:10px 12px 12px;
  background:rgba(0,0,0,.55);
  border-top:1px solid rgba(255,255,255,.06);
}
.rarity-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:.2em;
  margin-bottom:5px;opacity:.9;
}
.item-name{
  font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.06em;
  color:var(--bright);line-height:1.05;margin-bottom:8px;
}
.item-card.featured .item-name{font-size:22px}
.item-price{
  display:flex;align-items:center;gap:6px;margin-bottom:10px;
  font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.04em;
}
.price-icon{font-size:14px;opacity:.8}

.buy-btn{
  width:100%;height:36px;
  background:rgba(255,107,26,.12);border:1px solid rgba(255,107,26,.4);
  color:var(--bright);font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:.25em;
  cursor:pointer;
  clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));
  transition:all .14s;position:relative;overflow:hidden;
}
.buy-btn:hover{background:rgba(255,107,26,.25);border-color:var(--orange);
  box-shadow:0 0 18px rgba(255,107,26,.25)}
.buy-btn.owned{background:rgba(46,204,113,.1);border-color:rgba(46,204,113,.4);color:var(--success)}
.buy-btn.no-funds{background:rgba(232,35,10,.1);border-color:rgba(232,35,10,.4);color:var(--danger)}
.buy-btn.confirming{background:rgba(240,192,64,.12);border-color:rgba(240,192,64,.5);color:var(--gold)}
.best-value{
  position:absolute;top:10px;right:10px;
  background:var(--gold);color:#060809;
  font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:.15em;
  padding:3px 8px;clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,6px 100%,0 calc(100% - 6px));
}
.new-badge{
  position:absolute;top:10px;left:10px;
  background:var(--orange);color:#fff;
  font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:.15em;
  padding:3px 8px;clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,6px 100%,0 calc(100% - 6px));
}

/* Rarity card backgrounds */
.r-legendary .card-art{background:var(--leg-bg)}
.r-legendary .rarity-bar{background:linear-gradient(90deg,transparent,#F0C040,transparent)}
.r-legendary .rarity-badge{color:#F0C040}
.r-legendary .item-price{color:#F0C040}
.r-legendary{box-shadow:0 0 0 1px rgba(240,192,64,.25)}
.r-legendary:hover{box-shadow:0 0 28px rgba(240,192,64,.3),0 0 0 1px rgba(240,192,64,.4)}

.r-epic .card-art{background:var(--epic-bg)}
.r-epic .rarity-bar{background:linear-gradient(90deg,transparent,#8B5CF6,transparent)}
.r-epic .rarity-badge{color:#A78BFA}
.r-epic .item-price{color:#A78BFA}
.r-epic{box-shadow:0 0 0 1px rgba(139,92,246,.2)}
.r-epic:hover{box-shadow:0 0 24px rgba(139,92,246,.3),0 0 0 1px rgba(139,92,246,.4)}

.r-rare .card-art{background:var(--rare-bg)}
.r-rare .rarity-bar{background:linear-gradient(90deg,transparent,#3B82F6,transparent)}
.r-rare .rarity-badge{color:#60A5FA}
.r-rare .item-price{color:#60A5FA}
.r-rare{box-shadow:0 0 0 1px rgba(59,130,246,.2)}
.r-rare:hover{box-shadow:0 0 22px rgba(59,130,246,.25),0 0 0 1px rgba(59,130,246,.35)}

.r-uncommon .card-art{background:var(--unc-bg)}
.r-uncommon .rarity-bar{background:linear-gradient(90deg,transparent,#22C55E,transparent)}
.r-uncommon .rarity-badge{color:#4ADE80}
.r-uncommon .item-price{color:#4ADE80}
.r-uncommon{box-shadow:0 0 0 1px rgba(34,197,94,.15)}
.r-uncommon:hover{box-shadow:0 0 20px rgba(34,197,94,.2),0 0 0 1px rgba(34,197,94,.3)}

.r-common .card-art{background:var(--com-bg)}
.r-common .rarity-bar{background:linear-gradient(90deg,transparent,#6B7280,transparent)}
.r-common .rarity-badge{color:#9CA3AF}
.r-common .item-price{color:#9CA3AF}
.r-common{box-shadow:0 0 0 1px rgba(107,114,128,.15)}
.r-common:hover{box-shadow:0 0 16px rgba(107,114,128,.15),0 0 0 1px rgba(107,114,128,.25)}

/* Emote animations */
@keyframes salute{0%,100%{transform:rotate(0deg) translateY(0)}40%{transform:rotate(-20deg) translateY(-4px)}70%{transform:rotate(10deg) translateY(-2px)}}
@keyframes roll{0%{transform:translateX(-12px) rotate(-180deg)}100%{transform:translateX(12px) rotate(180deg)}}
@keyframes dogtag{0%,100%{transform:scale(1) rotate(-5deg)}50%{transform:scale(1.08) rotate(5deg)}}
@keyframes warcry{0%,100%{transform:scaleX(1)}25%{transform:scaleX(1.12) scaleY(.9)}75%{transform:scaleX(.9) scaleY(1.1)}}

/* ── MODALS ── */
.modal-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.75);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;
  animation:fade-in .18s ease;
}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
.modal{
  background:linear-gradient(145deg,#0C1018,#080C12);
  border:1px solid rgba(255,107,26,.3);
  clip-path:polygon(0 0,calc(100% - 20px) 0,100% 20px,100% 100%,20px 100%,0 calc(100% - 20px));
  padding:32px;min-width:360px;max-width:520px;width:90%;
  animation:modal-in .22s ease;position:relative;
}
@keyframes modal-in{from{transform:scale(.94) translateY(10px)}to{transform:scale(1) translateY(0)}}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:.1em;
  color:var(--bright);margin-bottom:6px;text-shadow:0 0 20px rgba(255,107,26,.3)}
.modal-sep{height:1px;background:linear-gradient(90deg,transparent,var(--orange),transparent);opacity:.4;margin:14px 0}
.modal-close{
  position:absolute;top:14px;right:14px;background:transparent;
  border:none;color:var(--muted);font-size:20px;cursor:pointer;
  width:28px;height:28px;display:flex;align-items:center;justify-content:center;
  transition:color .14s;
}
.modal-close:hover{color:var(--bright)}

/* Coin packages */
.coin-packages{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.coin-pkg{
  padding:16px;text-align:center;cursor:pointer;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,107,26,.2);
  transition:all .15s;
  clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));
}
.coin-pkg:hover{background:rgba(240,192,64,.08);border-color:rgba(240,192,64,.5);
  box-shadow:0 0 20px rgba(240,192,64,.15)}
.coin-pkg.popular{border-color:rgba(240,192,64,.5);background:rgba(240,192,64,.05)}
.pkg-amount{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--gold);letter-spacing:.04em}
.pkg-bonus{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--success);letter-spacing:.15em;margin:2px 0}
.pkg-price{font-family:'Exo 2',sans-serif;font-size:12px;color:var(--muted);margin-top:6px}
.pkg-label{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:.25em;
  color:var(--gold);margin-bottom:4px;display:block}

/* Confirm modal */
.confirm-item-art{display:flex;justify-content:center;margin:12px 0;
  padding:20px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06)}
.confirm-item-art svg{width:120px;height:100px}
.confirm-price{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.08em;
  text-align:center;margin:12px 0}
.confirm-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.btn-confirm{
  height:46px;background:rgba(255,107,26,.15);border:1px solid rgba(255,107,26,.5);
  color:var(--bright);font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.2em;
  cursor:pointer;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));
  transition:all .14s;
}
.btn-confirm:hover{background:rgba(255,107,26,.3);box-shadow:0 0 20px rgba(255,107,26,.3)}
.btn-cancel{
  height:46px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);
  color:var(--muted);font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.2em;
  cursor:pointer;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));
  transition:all .14s;
}
.btn-cancel:hover{background:rgba(255,255,255,.09);color:var(--bright)}

/* Shake animation for insufficient funds */
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.shake{animation:shake .35s ease}

/* Notification toast */
#toast{
  position:fixed;top:70px;right:20px;z-index:300;
  padding:12px 20px;min-width:240px;
  background:linear-gradient(135deg,rgba(8,14,20,.98),rgba(12,18,28,.95));
  border:1px solid rgba(255,107,26,.4);
  font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:.15em;
  clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px));
  transition:transform .3s,opacity .3s;transform:translateX(120%);opacity:0;
}
#toast.show{transform:translateX(0);opacity:1}
#toast.success{border-color:rgba(46,204,113,.5);color:var(--success)}
#toast.error{border-color:rgba(232,35,10,.5);color:var(--danger)}
#toast.info{border-color:rgba(255,107,26,.5);color:var(--orange)}
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div class="scanlines"></div>
<div class="vignette"></div>
<div class="hud-corner hud-tl"></div>
<div class="hud-corner hud-tr"></div>
<div class="hud-corner hud-bl"></div>
<div class="hud-corner hud-br"></div>
<div id="toast"></div>

<div id="app">
  <!-- TOP BAR -->
  <div id="topbar">
    <a href="/" id="back-btn">◂ BACK</a>
    <div class="title-sep"></div>
    <div id="shop-title">ITEM SHOP</div>
    <div class="title-sep"></div>
    <div style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.2em" id="shop-rotate-label">DAILY ROTATION</div>
    <div id="balance">
      <span id="balance-icon">◈</span>
      <span id="balance-val">2,400</span>
      <span style="font-size:11px;opacity:.5;margin-left:4px">COINS</span>
    </div>
  </div>

  <!-- TABS -->
  <div id="tabbar">
    <button class="tab-btn active" data-tab="featured">⬟ FEATURED <span class="tab-badge">NEW</span></button>
    <button class="tab-btn" data-tab="weapons">◈ WEAPONS</button>
    <button class="tab-btn" data-tab="skins">◉ SKINS</button>
    <button class="tab-btn" data-tab="emotes">▷ EMOTES</button>
    <button class="tab-btn" data-tab="bundles">⊞ BUNDLES <span class="tab-badge">HOT</span></button>
  </div>

  <!-- GRID -->
  <div id="grid-wrap">
    <div id="item-grid"></div>
  </div>

  <!-- BOTTOM BAR -->
  <div id="bottombar">
    <span id="shop-timer">◈ SHOP ROTATION ACTIVE</span>
    <span id="reset-timer">DAILY RESET IN <span>--:--:--</span></span>
  </div>
</div>

<!-- GET COINS FIXED BUTTON -->
<button id="get-coins-fixed" onclick="openCoinsModal()">+ GET COINS ◈</button>

<script>
// ─────────────────────────────────────────────────────────────────────────────
//  CANVAS BACKGROUND (same as main menu)
// ─────────────────────────────────────────────────────────────────────────────
const cvs = document.getElementById('bg');
const ctx2 = cvs.getContext('2d');
let W, H;
const particles = [];
const muzzleFlashes = [];
let muzzleTimer = 3 + Math.random()*5;
let heliX = null, heliTimer = 20 + Math.random()*10;
let lastTs = 0;

function resizeBg() { W = cvs.width = window.innerWidth; H = cvs.height = window.innerHeight; }
window.addEventListener('resize', resizeBg); resizeBg();

for (let i = 0; i < 180; i++) particles.push({
  x:Math.random(), y:Math.random(),
  vx:(Math.random()-.5)*.0003, vy:-(0.0002+Math.random()*.0008),
  size:.8+Math.random()*2, alpha:.2+Math.random()*.7, life:Math.random()
});

function drawBg(ts) {
  requestAnimationFrame(drawBg);
  const dt = Math.min(.05,(ts-lastTs)/1000); lastTs=ts;
  const c=ctx2;
  const sky=c.createLinearGradient(0,0,0,H*.72);
  sky.addColorStop(0,'#060809'); sky.addColorStop(.4,'#080C10');
  sky.addColorStop(.7,'#0D1218'); sky.addColorStop(1,'#141820');
  c.fillStyle=sky; c.fillRect(0,0,W,H);

  // Light rays
  const hy=H*.62;
  c.save();
  for(let r=0;r<5;r++){
    const a=(Math.PI*.55)+(r-2.5)*.065;
    const ex=W*.5+Math.tan(a-Math.PI/2)*(H-hy), hw=Math.tan(.018)*(H-hy);
    const g=c.createLinearGradient(W*.5,hy,ex,H*.05);
    g.addColorStop(0,'rgba(255,107,26,.04)'); g.addColorStop(1,'rgba(255,107,26,0)');
    c.beginPath(); c.moveTo(W*.5,hy);
    c.lineTo(ex-hw,0); c.lineTo(ex+hw,0); c.closePath();
    c.fillStyle=g; c.fill();
  }
  c.restore();

  // Horizon glow
  const hg=c.createRadialGradient(W*.5,hy,0,W*.5,hy,W*.5);
  hg.addColorStop(0,'rgba(255,107,26,.12)'); hg.addColorStop(1,'rgba(0,0,0,0)');
  c.fillStyle=hg; c.fillRect(0,0,W,H);

  // Ruins
  const RUINS=[
    {x:.04,y:.578,w:.042,h:.122,notches:[[.05,.25],[.45,.18],[.7,.3]],wlit:[0,2]},
    {x:.09,y:.598,w:.022,h:.072,notches:[[.2,.22],[.6,.28]],wlit:[]},
    {x:.115,y:.558,w:.034,h:.112,notches:[[.1,.2],[.55,.25],[.8,.18]],wlit:[1]},
    {x:.155,y:.588,w:.026,h:.082,notches:[[.3,.22]],wlit:[0]},
    {x:.19,y:.548,w:.044,h:.13,notches:[[.05,.28],[.5,.2],[.75,.26]],wlit:[2]},
    {x:.70,y:.548,w:.05,h:.135,notches:[[.1,.26],[.45,.18],[.72,.3]],wlit:[0,1]},
    {x:.758,y:.588,w:.03,h:.082,notches:[[.3,.24]],wlit:[1]},
    {x:.798,y:.548,w:.042,h:.122,notches:[[.08,.2],[.5,.26],[.78,.22]],wlit:[2]},
    {x:.848,y:.572,w:.026,h:.09,notches:[[.2,.28],[.6,.22]],wlit:[]},
    {x:.882,y:.558,w:.036,h:.112,notches:[[.15,.24],[.55,.2]],wlit:[0]},
  ];
  for(const b of RUINS){
    const bx=b.x*W,by=b.y*H,bw=b.w*W,bh=b.h*H;
    c.fillStyle='#050707'; c.fillRect(bx,by,bw,bh);
    c.fillStyle='#060809';
    for(const[ns,nw] of b.notches) c.fillRect(bx+ns*bw,by,nw*bw,bh*.28+nw*bh*.6);
    const cols=3,rows=2,ww=bw*.13,wh=bh*.13;
    const wgx=(bw-cols*ww)/(cols+1),wgy=bh*.14,wsy=by+bh*.32;
    for(let row=0;row<rows;row++) for(let col=0;col<cols;col++){
      const wx=bx+wgx*(col+1)+col*ww,wy=wsy+row*(wh+wgy),idx=row*cols+col;
      c.fillStyle='#080A0A'; c.fillRect(wx-1,wy-1,ww+2,wh+2);
      c.fillStyle=b.wlit.includes(idx)?'rgba(255,100,20,.11)':(idx%4===2?'#020304':'#040608');
      c.fillRect(wx,wy,ww,wh);
    }
  }

  // Grid
  c.save(); c.strokeStyle='rgba(255,107,26,.022)'; c.lineWidth=.5;
  for(let gx=0;gx<W;gx+=60){c.beginPath();c.moveTo(gx,0);c.lineTo(gx,H);c.stroke()}
  for(let gy=0;gy<H;gy+=60){c.beginPath();c.moveTo(0,gy);c.lineTo(W,gy);c.stroke()}
  c.restore();

  // Terrain
  c.fillStyle='#030505'; c.beginPath(); c.moveTo(0,H);
  [[0,.72],[.05,.70],[.1,.73],[.15,.68],[.2,.71],[.25,.67],[.3,.70],[.35,.65],
   [.4,.69],[.45,.63],[.5,.67],[.55,.64],[.6,.68],[.65,.62],[.7,.66],[.75,.70],
   [.8,.67],[.85,.71],[.9,.68],[.95,.72],[1,.70]].forEach(([px,py])=>c.lineTo(px*W,py*H));
  c.lineTo(W,H); c.closePath(); c.fill();

  // Muzzle flashes
  muzzleTimer-=dt;
  if(muzzleTimer<=0){muzzleTimer=3+Math.random()*5;muzzleFlashes.push({x:(0.05+Math.random()*.85)*W,y:(.55+Math.random()*.12)*H,life:1,max:.1+Math.random()*.08})}
  for(let i=muzzleFlashes.length-1;i>=0;i--){
    const f=muzzleFlashes[i]; f.life-=dt/f.max;
    if(f.life<=0){muzzleFlashes.splice(i,1);continue}
    const a=Math.pow(f.life,.5)*.85,r=(1-f.life)*28+4;
    const fg=c.createRadialGradient(f.x,f.y,0,f.x,f.y,r);
    fg.addColorStop(0,`rgba(255,255,200,${a})`); fg.addColorStop(.4,`rgba(255,160,60,${a*.5})`); fg.addColorStop(1,'rgba(255,80,10,0)');
    c.fillStyle=fg; c.beginPath(); c.arc(f.x,f.y,r,0,Math.PI*2); c.fill();
  }

  // Helicopter
  heliTimer-=dt;
  if(heliX===null&&heliTimer<=0){heliX=-0.15;heliTimer=22+Math.random()*10}
  if(heliX!==null){
    heliX+=dt*.038;
    const hx=heliX*W,hy2=H*.2;
    c.save(); c.fillStyle='#080A08';
    c.beginPath(); c.ellipse(hx,hy2,30,9,0,0,Math.PI*2); c.fill();
    c.beginPath(); c.moveTo(hx+30,hy2); c.lineTo(hx+65,hy2-4); c.lineTo(hx+65,hy2+2); c.lineTo(hx+30,hy2+4); c.closePath(); c.fill();
    c.fillRect(hx-20,hy2+9,18,3); c.fillRect(hx+4,hy2+9,18,3);
    c.strokeStyle='rgba(28,36,28,.55)'; c.lineWidth=1.8;
    for(let r=0;r<4;r++){const ang=Date.now()/80+r*Math.PI/2;c.beginPath();c.moveTo(hx+Math.cos(ang)*40,hy2-10+Math.sin(ang)*3);c.lineTo(hx-Math.cos(ang)*40,hy2-10-Math.sin(ang)*3);c.stroke()}
    c.fillStyle=`rgba(255,40,40,${.5+.5*Math.sin(Date.now()/400)})`; c.beginPath(); c.arc(hx-28,hy2,2,0,Math.PI*2); c.fill();
    c.restore();
    if(heliX>1.15)heliX=null;
  }

  // Fog
  const ft=Date.now()/1000;
  for(let f=0;f<3;f++){
    const fx=((ft*.006*(f+1)+f*.33)%1.4-.2)*W;
    const fg2=c.createLinearGradient(fx,H*.5,fx+W*.55,H*.9);
    fg2.addColorStop(0,'rgba(10,14,18,0)'); fg2.addColorStop(.3,`rgba(10,14,18,${.05-f*.012})`); fg2.addColorStop(1,'rgba(10,14,18,0)');
    c.fillStyle=fg2; c.fillRect(fx,H*.5,W*.55,H*.5);
  }

  // Embers
  for(const p of particles){
    p.x+=p.vx*dt*60; p.y+=p.vy*dt*60; p.life+=dt*.4;
    if(p.life>=1){p.life=0;p.x=Math.random();p.y=.9+Math.random()*.15;p.vy=-(0.0002+Math.random()*.0008);p.vx=(Math.random()-.5)*.0003}
    const fade=p.life<.15?p.life/.15:p.life>.7?(1-p.life)/.3:1;
    c.fillStyle=`hsla(${20+Math.random()*15},100%,60%,${p.alpha*fade*.8})`; c.beginPath(); c.arc(p.x*W,p.y*H,p.size*.55,0,Math.PI*2); c.fill();
  }
}

function updateTimer(){
  const now=new Date(), midnight=new Date(Date.UTC(now.getUTCFullYear(),now.getUTCMonth(),now.getUTCDate()+1));
  const diff=midnight-now;
  const h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
  const el=document.querySelector('#reset-timer span');
  if(el)el.textContent=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
setInterval(updateTimer,1000); updateTimer();

    const el = createCard(item, idx);
    grid.appendChild(el);
  });
}

function createCard(item, idx) {
  const owned = LS.isOwned(item.id);
  const isBundle = item.type === 'bundle';
  const div = document.createElement('div');
  div.className = `item-card r-${item.rarity}${isBundle ? ' featured' : ''}`;
  div.style.animationDelay = `${idx * 0.04}s`;

  div.innerHTML = `
    ${item.isNew ? '<div class="new-badge">NEW</div>' : ''}
    ${item.bestValue ? '<div class="best-value">BEST VALUE</div>' : ''}
    <div class="card-art">${SVG[item.svg] || ''}</div>
    <div class="rarity-bar"></div>
    <div class="card-meta">
      <div class="rarity-badge">${RARITY_LABELS[item.rarity]}</div>
      <div class="item-name">${item.name}</div>
      ${item.desc ? `<div style="font-size:10px;color:var(--muted);margin-bottom:6px;line-height:1.4;">${item.desc}</div>` : ''}
      <div class="item-price">
        <span class="price-icon">◈</span>
        <span>${item.price.toLocaleString()}</span>
      </div>
      <button class="buy-btn${owned ? ' owned' : ''}" data-id="${item.id}">
        ${owned ? 'OWNED ✓' : 'PURCHASE'}
      </button>
    </div>
  `;

  div.querySelector('.buy-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    handlePurchaseClick(item);
  });

  return div;
}

// ─────────────────────────────────────────────────────────────────────────────
//  PURCHASE FLOW
// ─────────────────────────────────────────────────────────────────────────────
function handlePurchaseClick(item) {
  if (LS.isOwned(item.id)) return;
  if (LS.getBalance() < item.price) {
    showToast('INSUFFICIENT FUNDS — GET MORE COINS', 'error');
    const btn = document.querySelector(`[data-id="${item.id}"]`);
    if (btn) { btn.classList.add('no-funds','shake'); setTimeout(()=>btn.classList.remove('shake'),400); }
    return;
  }
  openConfirmModal(item);
}

function openConfirmModal(item) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <button class="modal-close" id="conf-close">✕</button>
      <div class="modal-title">CONFIRM PURCHASE</div>
      <div style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.2em">${item.name.toUpperCase()}</div>
      <div class="modal-sep"></div>
      <div class="confirm-item-art r-${item.rarity}" style="border-color:transparent">${SVG[item.svg]||''}</div>
      <div class="confirm-price r-${item.rarity}" style="color:inherit">
        <span style="opacity:.6;font-size:16px">◈</span> ${item.price.toLocaleString()} COINS
      </div>
      <div style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);text-align:center">
        BALANCE AFTER: ◈ ${(LS.getBalance()-item.price).toLocaleString()}
      </div>
      <div class="modal-sep"></div>
      <div class="confirm-btns">
        <button class="btn-confirm" id="conf-yes">CONFIRM</button>
        <button class="btn-cancel" id="conf-no">CANCEL</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelector('#conf-yes').addEventListener('click', () => {
    completePurchase(item);
    overlay.remove();
  });
  overlay.querySelector('#conf-no').addEventListener('click', () => overlay.remove());
  overlay.querySelector('#conf-close').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
}

function completePurchase(item) {
  LS.setBalance(LS.getBalance() - item.price);
  LS.addOwned(item.id);
  const btn = document.querySelector(`[data-id="${item.id}"]`);
  if (btn) {
    btn.textContent = 'OWNED ✓';
    btn.classList.remove('no-funds');
    btn.classList.add('owned');
  }
  showToast(`${item.name.toUpperCase()} PURCHASED!`, 'success');
}

// ─────────────────────────────────────────────────────────────────────────────
//  COIN PACKAGES MODAL
// ─────────────────────────────────────────────────────────────────────────────
const PACKAGES = [
  { amount:1000, bonus:'',        price:'$9.99',  label:'' },
  { amount:2800, bonus:'+300 FREE', price:'$24.99', label:'POPULAR', popular:true },
  { amount:5000, bonus:'+700 FREE', price:'$39.99', label:'' },
  { amount:13500,bonus:'+2000 FREE',price:'$99.99', label:'BEST VALUE', popular:true },
];

function openCoinsModal() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal" style="max-width:480px">
      <button class="modal-close" id="coins-close">✕</button>
      <div class="modal-title">GET COINS</div>
      <div style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.2em">◈ BATTLEZONE CURRENCY</div>
      <div class="modal-sep"></div>
      <div class="coin-packages">
        ${PACKAGES.map(p => `
          <div class="coin-pkg${p.popular?' popular':''}" data-amount="${p.amount}">
            ${p.label?`<span class="pkg-label">${p.label}</span>`:'<span class="pkg-label">&nbsp;</span>'}
            <div class="pkg-amount">◈ ${p.amount.toLocaleString()}</div>
            ${p.bonus?`<div class="pkg-bonus">${p.bonus}</div>`:'<div class="pkg-bonus">&nbsp;</div>'}
            <div class="pkg-price">${p.price}</div>
          </div>
        `).join('')}
      </div>
      <div class="modal-sep"></div>
      <div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);text-align:center;letter-spacing:.1em">DEMO: COINS ADDED FREE — NO REAL PAYMENT</div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelectorAll('.coin-pkg').forEach(el => {
    el.addEventListener('click', () => {
      const amount = parseInt(el.dataset.amount);
      LS.setBalance(LS.getBalance() + amount);
      showToast(`◈ ${amount.toLocaleString()} COINS ADDED!`, 'info');
      overlay.remove();
      renderGrid(activeTab);
    });
  });
  overlay.querySelector('#coins-close').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
}

// ─────────────────────────────────────────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type='info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 3000);
}

// ─────────────────────────────────────────────────────────────────────────────
//  TABS
// ─────────────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid(btn.dataset.tab);
    document.getElementById('grid-wrap').scrollTop = 0;
  });
});

// ─────────────────────────────────────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────────────────────────────────────
renderGrid('featured');
</script>
</body>
</html>
