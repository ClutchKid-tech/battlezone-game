<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="BattleZone — Browser-based 100-player Battle Royale">
  <title>BATTLEZONE</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    #game-canvas {
      display: block;
      width: 100vw; height: 100vh;
    }

    /* ── Auth screen ───────────────────────────────────────────────── */
    #auth-screen {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #0a0a1a 0%, #0d1a2e 60%, #0a1a0a 100%);
      display: flex; align-items: center; justify-content: center;
      z-index: 2000; color: #fff;
    }

    .auth-box {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px; padding: 40px;
      width: 380px; display: flex; flex-direction: column; gap: 14px;
    }

    .auth-box h1 {
      font-size: 28px; font-weight: 900; text-align: center;
      background: linear-gradient(90deg,#4af,#f4a);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 8px; letter-spacing: -1px;
    }

    .auth-box input {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px; padding: 12px 14px;
      color: #fff; font-size: 15px; outline: none;
      transition: border-color 0.15s;
    }
    .auth-box input:focus { border-color: #4af; }
    .auth-box input::placeholder { color: rgba(255,255,255,0.35); }

    .auth-btn {
      padding: 12px; border-radius: 8px; border: none;
      font-size: 15px; font-weight: 700; cursor: pointer;
      letter-spacing: 1px; transition: opacity 0.15s;
    }
    .auth-btn:hover { opacity: 0.85; }
    .auth-btn-primary { background: linear-gradient(90deg,#1a5a8a,#2a8aba); color: #fff; }
    .auth-btn-secondary { background: rgba(255,255,255,0.08); color: #ccc; border: 1px solid rgba(255,255,255,0.15) !important; }

    #auth-error { color: #f88; font-size: 13px; display: none; text-align: center; }
    #auth-divider { text-align: center; opacity: 0.3; font-size: 13px; }

    /* ── Global animations ─────────────────────────────────────────── */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInRight {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }

    /* ── Scrollbar ─────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.04); }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }

    /* ── Context menu blocker ──────────────────────────────────────── */
    canvas { user-select: none; -webkit-user-select: none; }
  </style>
</head>
<body>

  <!-- 3D canvas -->
  <canvas id="game-canvas"></canvas>

  <!-- Auth screen (shown before login) -->
  <div id="auth-screen">
    <div class="auth-box">
      <h1>BATTLEZONE</h1>

      <input id="auth-username"  type="text"     placeholder="Username" autocomplete="username">
      <input id="auth-email"     type="email"    placeholder="Email (register only)" autocomplete="email">
      <input id="auth-password"  type="password" placeholder="Password" autocomplete="current-password">

      <div id="auth-error"></div>

      <button id="auth-login-btn"    class="auth-btn auth-btn-primary">LOGIN</button>
      <div class="auth-divider" id="auth-divider">— or —</div>
      <button id="auth-register-btn" class="auth-btn auth-btn-secondary">CREATE ACCOUNT</button>

      <div style="text-align:center;font-size:11px;opacity:0.3;margin-top:8px;">
        By playing you agree to our Terms of Service and Privacy Policy
      </div>
    </div>
  </div>

  <!-- Auth — inline so it works even if the game bundle has issues -->
  <script>
  (function () {
    var authEl = document.getElementById('auth-screen');
    var errorEl = document.getElementById('auth-error');

    // If already logged in, hide auth immediately
    try {
      if (sessionStorage.getItem('token') && sessionStorage.getItem('user')) {
        authEl.style.display = 'none';
      }
    } catch(e) {}

    function showError(msg) {
      if (!errorEl) return;
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
    }
    function clearError() {
      if (errorEl) errorEl.style.display = 'none';
    }

    async function doAuth(path, body) {
      var res = await fetch('/api/auth/' + path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify(body),
      });
      var data = await res.json().catch(function() { return {}; });
      if (!res.ok) throw new Error(data.error || data.message || res.statusText);
      return data;
    }

    function onSuccess(result) {
      try {
        sessionStorage.setItem('token', result.access);
        sessionStorage.setItem('user', JSON.stringify({ id: result.userId, username: result.username }));
      } catch(e) {}
      authEl.style.display = 'none';
      // Notify the game bundle that auth is complete
      window.dispatchEvent(new CustomEvent('auth:success', { detail: result }));
    }

    document.getElementById('auth-login-btn').addEventListener('click', async function() {
      clearError();
      var username = document.getElementById('auth-username').value.trim();
      var password = document.getElementById('auth-password').value;
      if (!username || !password) { showError('Enter username and password'); return; }
      try {
        var result = await doAuth('login', { username: username, password: password });
        onSuccess(result);
      } catch(err) { showError(err.message); }
    });

    document.getElementById('auth-register-btn').addEventListener('click', async function() {
      clearError();
      var username = document.getElementById('auth-username').value.trim();
      var email    = document.getElementById('auth-email').value.trim();
      var password = document.getElementById('auth-password').value;
      if (!username || !email || !password) { showError('Fill in all fields'); return; }
      try {
        var result = await doAuth('register', { username: username, email: email, password: password });
        onSuccess(result);
      } catch(err) { showError(err.message); }
    });
  })();
  </script>

  <!-- Stripe.js for payment processing (loaded async) -->
  <script src="https://js.stripe.com/v3/" async></script>

  <!-- Game bundle (Vite builds this) -->
  <script type="module" src="/src/main.js"></script>

  <!-- Prevent right-click context menu in game -->
  <script>document.addEventListener('contextmenu', e => e.preventDefault());</script>

</body>
</html>
